<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Gourmet</title>

  <!-- Fuentes elegantes -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2 class="brand">MAISON NOIR</h2>
  <h1>Carte du soir</h1>

  <nav>
    <a href="#entrees" class="nav-link active">ENTRÉES</a>
    <a href="#plats" class="nav-link">PLATS</a>
    <a href="#desserts" class="nav-link">DESSERTS</a>
  </nav>
</header>

<!-- ENTRADAS -->
<section id="entrees" class="menu-section">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="">
    <div class="info">
      <span class="tag">SIGNATURE</span>
      <h2>Wagyu con trufa negra</h2>
      <p>Corte A5, trufa de Périgord, salsa bordelesa</p>
      <span class="price">$1,890</span>
    </div>
  </div>
</section>

<!-- PLATOS -->
<section id="plats" class="menu-section">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1553621042-f6e147245754" alt="">
    <div class="info">
      <span class="tag">CHEF'S CHOICE</span>
      <h2>Langosta gratinée</h2>
      <p>Langosta entera, mantequilla de hierbas, caviar</p>
      <span class="price">$2,200</span>
    </div>
  </div>
</section>

<!-- POSTRES -->
<section id="desserts" class="menu-section">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb" alt="">
    <div class="info">
      <span class="tag">CLÁSICO</span>
      <h2>Soufflé de chocolate</h2>
      <p>Chocolate belga, centro líquido</p>
      <span class="price">$320</span>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
